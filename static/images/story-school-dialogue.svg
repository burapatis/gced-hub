<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="ภาพประกอบ: นักเรียนนั่งล้อมวงสนทนาและรับฟังกันในห้องเรียน">
  <defs><clipPath id="f1"><rect width="320" height="180" rx="14"/></clipPath></defs>
  <g clip-path="url(#f1)">
    <rect width="320" height="180" fill="#FAF7EF"/>
    <!-- ผนังห้องเรียน + กระดาน -->
    <rect width="320" height="112" fill="#DCEEFF"/>
    <rect x="112" y="18" width="96" height="54" rx="6" fill="#1E4E8C"/>
    <rect x="112" y="18" width="96" height="54" rx="6" fill="none" stroke="#D9A441" stroke-width="3"/>
    <!-- หัวใจ + คำพูดบนกระดาน -->
    <path d="M152 38c0-6 9-8 10-1 1-7 10-5 10 1 0 6-10 12-10 12s-10-6-10-12z" fill="#E76F51"/>
    <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <path d="M124 58h28"/><path d="M168 58h28"/>
    </g>
    <!-- พื้นห้อง -->
    <rect y="112" width="320" height="68" fill="#F3EBDD"/>
    <ellipse cx="160" cy="140" rx="96" ry="26" fill="#DCEEFF" opacity="0.7"/>
    <!-- วงสนทนา 5 คน -->
    <!-- ซ้ายสุด -->
    <g>
      <circle cx="66" cy="116" r="13" fill="#E76F51"/>
      <path d="M48 158q0-26 18-26t18 26z" fill="#E76F51"/>
    </g>
    <!-- ซ้าย -->
    <g>
      <circle cx="114" cy="128" r="13" fill="#D9A441"/>
      <path d="M96 170q0-26 18-26t18 26z" fill="#D9A441"/>
    </g>
    <!-- กลาง (ผู้กำลังเล่า มี speech bubble) -->
    <g>
      <circle cx="160" cy="122" r="14" fill="#1E4E8C"/>
      <path d="M141 166q0-28 19-28t19 28z" fill="#1E4E8C"/>
    </g>
    <!-- ขวา -->
    <g>
      <circle cx="206" cy="128" r="13" fill="#5FA777"/>
      <path d="M188 170q0-26 18-26t18 26z" fill="#5FA777"/>
    </g>
    <!-- ขวาสุด -->
    <g>
      <circle cx="254" cy="116" r="13" fill="#263238"/>
      <path d="M236 158q0-26 18-26t18 26z" fill="#263238"/>
    </g>
    <!-- speech bubble ของผู้เล่า -->
    <g>
      <rect x="176" y="84" width="58" height="26" rx="12" fill="#FFFFFF" stroke="#1E4E8C" stroke-width="2"/>
      <path d="M186 108l-6 10 14-8z" fill="#FFFFFF" stroke="#1E4E8C" stroke-width="2" stroke-linejoin="round"/>
      <g fill="#1E4E8C">
        <circle cx="194" cy="97" r="3"/><circle cx="205" cy="97" r="3"/><circle cx="216" cy="97" r="3"/>
      </g>
    </g>
    <!-- สัญลักษณ์การฟัง (หูฟังใจ) ด้านซ้าย -->
    <g>
      <rect x="52" y="78" width="46" height="24" rx="11" fill="#FFFFFF" stroke="#5FA777" stroke-width="2"/>
      <path d="M88 102l8 8-2-12z" fill="#FFFFFF" stroke="#5FA777" stroke-width="2" stroke-linejoin="round"/>
      <path d="M70 87c0-4 6-6 7 0 1-6 7-4 7 0 0 4-7 8-7 8s-7-4-7-8z" fill="#5FA777"/>
    </g>
  </g>
</svg>
