<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="ภาพประกอบ: ห้องเรียนหลากวัฒนธรรม เด็ก ๆ ทักทายกันหลายภาษา">
  <defs><clipPath id="f4"><rect width="320" height="180" rx="14"/></clipPath></defs>
  <g clip-path="url(#f4)">
    <rect width="320" height="180" fill="#DCEEFF"/>
    <!-- แผนที่โลกจาง ๆ พื้นหลัง -->
    <g fill="#FFFFFF" opacity="0.55">
      <path d="M36 34q22-14 44-4t10 26q-18 10-38 2t-16-24z"/>
      <path d="M232 22q26-8 40 6t2 26q-20 8-38-4t-4-28z"/>
      <path d="M140 132q18-10 34 0t6 22q-16 8-32 0t-8-22z"/>
    </g>
    <!-- พื้นห้อง -->
    <rect y="126" width="320" height="54" fill="#FAF7EF"/>
    <!-- เด็ก 4 คนหลากวัฒนธรรม -->
    <g>
      <circle cx="64" cy="112" r="14" fill="#E76F51"/>
      <path d="M44 158q0-30 20-30t20 30z" fill="#E76F51"/>
    </g>
    <g>
      <circle cx="128" cy="118" r="14" fill="#D9A441"/>
