      <path d="M114 116a14 14 0 0128 0v8h-5v-8a9 9 0 00-18 0v8h-5z" fill="#B98530"/>
    </g>
    <g>
      <circle cx="192" cy="118" r="14" fill="#5FA777"/>
      <path d="M172 164q0-30 20-30t20 30z" fill="#5FA777"/>
    </g>
    <g>
      <circle cx="256" cy="112" r="14" fill="#1E4E8C"/>
      <path d="M236 158q0-30 20-30t20 30z" fill="#1E4E8C"/>
    </g>
    <!-- มือโบกทักทาย -->
    <g stroke-linecap="round" fill="none">
      <path d="M80 122q10-8 12-16" stroke="#E76F51" stroke-width="6"/>
      <path d="M240 122q-10-8-12-16" stroke="#1E4E8C" stroke-width="6"/>
    </g>
    <!-- speech bubbles ทักทายหลายภาษา -->
    <g font-family="sans-serif" font-weight="bold" text-anchor="middle">
      <g>
        <rect x="30" y="52" width="70" height="26" rx="12" fill="#FFFFFF" stroke="#E76F51" stroke-width="2"/>
        <path d="M56 78l-4 9 12-7z" fill="#FFFFFF" stroke="#E76F51" stroke-width="2" stroke-linejoin="round"/>
        <text x="65" y="70" font-size="14" fill="#E76F51">สวัสดี</text>
      </g>
      <g>
        <rect x="106" y="40" width="56" height="26" rx="12" fill="#FFFFFF" stroke="#D9A441" stroke-width="2"/>
        <path d="M128 66l-4 9 12-7z" fill="#FFFFFF" stroke="#D9A441" stroke-width="2" stroke-linejoin="round"/>
        <text x="134" y="58" font-size="13" fill="#B98530">Salam</text>
      </g>
      <g>
        <rect x="170" y="52" width="50" height="26" rx="12" fill="#FFFFFF" stroke="#5FA777" stroke-width="2"/>
