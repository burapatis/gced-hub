      <path d="M150 120q60-44 122 6"/>
      <path d="M138 190q70 52 146-14"/>
    </g>
    <g fill="#FAF7EF">
      <circle cx="150" cy="120" r="5"/>
      <circle cx="272" cy="126" r="5"/>
      <circle cx="138" cy="190" r="5"/>
      <circle cx="284" cy="176" r="5"/>
    </g>
    <!-- นกพิราบสันติภาพ -->
    <g transform="translate(284 74)">
      <path d="M0 18q14-16 34-10-6 4-8 10 14-4 26 4-16 2-22 10t-20 8q-14 0-18-10 4-8 8-12z" fill="#FFFFFF"/>
      <path d="M8 6q10-10 22-6-10 6-12 16-8-4-10-10z" fill="#FFFFFF"/>
      <circle cx="5" cy="16" r="1.8" fill="#263238"/>
      <path d="M-4 19l-7 2 7 3z" fill="#D9A441"/>
