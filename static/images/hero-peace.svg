        <ellipse cx="-23" cy="29" rx="4" ry="2" transform="rotate(-18 -23 29)"/>
      </g>
    </g>
    <!-- ผู้คนหลากหลายจับมือกันด้านหน้าโลก -->
    <!-- คนที่ 1 -->
    <g>
      <circle cx="92" cy="240" r="16" fill="#E76F51"/>
      <path d="M68 300q0-34 24-34t24 34z" fill="#E76F51"/>
      <circle cx="92" cy="240" r="16" fill="#FFFFFF" opacity="0.15"/>
