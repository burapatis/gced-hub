<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" role="img" aria-label="ภาพประกอบ: ผู้คนหลากหลายจับมือล้อมรอบโลก มีนกพิราบสันติภาพโบยบิน">
  <defs>
    <clipPath id="frame"><rect width="420" height="340" rx="24"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="420" height="340" fill="#DCEEFF"/>
    <!-- แสงอาทิตย์อ่อน ๆ -->
    <circle cx="352" cy="52" r="34" fill="#FAF7EF"/>
    <circle cx="352" cy="52" r="24" fill="#D9A441" opacity="0.9"/>
    <!-- เมฆ -->
    <g fill="#FFFFFF" opacity="0.9">
      <ellipse cx="80" cy="52" rx="34" ry="13"/>
      <ellipse cx="106" cy="44" rx="24" ry="11"/>
      <ellipse cx="250" cy="34" rx="26" ry="10"/>
    </g>
    <!-- โลก -->
    <circle cx="210" cy="168" r="86" fill="#1E4E8C"/>
    <circle cx="210" cy="168" r="86" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="3"/>
    <!-- แผ่นดินแบบนามธรรม -->
    <g fill="#5FA777">
      <path d="M158 128q16-18 38-12t26 22q-4 16-22 18t-32-6q-14-8-10-22z"/>
      <path d="M236 176q18-8 30 2t8 24q-12 12-28 8t-16-16q-2-12 6-18z"/>
      <path d="M172 196q12-4 20 4t2 18q-10 8-20 2t-2-24z"/>
    </g>
    <!-- เส้นเชื่อมโยงผู้คนบนโลก -->
