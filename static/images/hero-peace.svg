      <circle cx="151" cy="248" r="16" fill="#D9A441"/>
      <path d="M127 306q0-34 24-34t24 34z" fill="#D9A441"/>
    </g>
    <!-- คนที่ 3 (กลาง ชูมือถือใบไม้) -->
    <g>
      <circle cx="210" cy="242" r="17" fill="#1E4E8C"/>
      <path d="M184 304q0-36 26-36t26 36z" fill="#1E4E8C"/>
    </g>
    <!-- คนที่ 4 -->
    <g>
      <circle cx="269" cy="248" r="16" fill="#5FA777"/>
      <path d="M245 306q0-34 24-34t24 34z" fill="#5FA777"/>
    </g>
