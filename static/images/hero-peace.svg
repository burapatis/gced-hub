    <!-- พื้นดิน -->
    <path d="M-10 306q110 26 220 12t220-6v40H-10z" fill="#5FA777"/>
    <path d="M-10 318q120 20 430 2v32H-10z" fill="#4C8F66"/>
    <!-- หัวใจเล็ก ๆ ลอยขึ้น -->
    <g fill="#E76F51">
      <path d="M62 196c0-5 8-7 9-1 1-6 9-4 9 1 0 5-9 10-9 10s-9-5-9-10z"/>
      <path d="M348 188c0-4 6-6 7-1 1-5 7-3 7 1 0 4-7 8-7 8s-7-4-7-8z" opacity="0.85"/>
    </g>
  </g>
</svg>
