# Workflow สำหรับ build และ deploy เว็บไซต์ Hugo ขึ้น GitHub Pages
# วิธีเปิดใช้งาน: ไปที่ Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy Hugo site to GitHub Pages

on:
  # รันเมื่อ push ขึ้น branch หลัก
  push:
    branches: ["main"]
  # อนุญาตให้กดรันเองจากแท็บ Actions ได้
  workflow_dispatch:

# กำหนดสิทธิ์ให้ GITHUB_TOKEN สำหรับ deploy ไปยัง GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# อนุญาต deploy พร้อมกันครั้งเดียว
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - name: Install Hugo CLI (Extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
