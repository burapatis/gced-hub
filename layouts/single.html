{{ define "main" }}
{{ partial "breadcrumb.html" . }}
<article class="container page-single">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-lede">{{ . }}</p>{{ end }}
    {{ if .Date }}<p class="page-meta"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time></p>{{ end }}
  </header>
  <div class="prose">
    {{ .Content }}
  </div>
</article>
{{ end }}
