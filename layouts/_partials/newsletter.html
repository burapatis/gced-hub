<section class="newsletter" aria-labelledby="newsletter-heading">
  <div class="container newsletter-inner">
    <div>
      <h2 id="newsletter-heading">รับข่าวสารและทรัพยากรใหม่</h2>
      <p>จดหมายข่าวรายเดือน: แผนการสอนใหม่ กิจกรรม และบทความคัดสรร (แบบฟอร์มตัวอย่าง — ยังไม่เชื่อมระบบส่งอีเมลจริง)</p>
    </div>
    <form class="newsletter-form js-mock-form" novalidate>
      <label for="newsletter-email">อีเมลของคุณ</label>
      <div class="newsletter-row">
        <input type="email" id="newsletter-email" name="email" placeholder="name@example.com"
               autocomplete="email" required>
        <button type="submit" class="btn btn-primary">สมัครรับข่าวสาร</button>
      </div>
      <p class="form-status" role="status" aria-live="polite"></p>
    </form>
  </div>
</section>
