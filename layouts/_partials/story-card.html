{{- /* พารามิเตอร์: title, description, url, source (ไม่บังคับ), image (ไม่บังคับ) */ -}}
{{- $img := .image | default "images/placeholder-story.svg" -}}
<article class="card story-card">
  <img class="card-img" src="{{ partial "rel.html" $img }}" alt="" width="320" height="180" loading="lazy">
  <div class="card-body">
    {{ with .source }}<p class="card-badge badge-green">{{ . }}</p>{{ end }}
    <h3 class="card-title"><a href="{{ partial "rel.html" .url }}">{{ .title }}</a></h3>
    <p class="card-desc">{{ .description }}</p>
    <a class="card-more" href="{{ partial "rel.html" .url }}">อ่านเรื่องเล่า<span aria-hidden="true"> →</span></a>
  </div>
</article>
