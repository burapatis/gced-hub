<!DOCTYPE html>
<html lang="th">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main-content">ข้ามไปยังเนื้อหาหลัก</a>

  {{ partial "header.html" . }}
  {{ partial "accessibility-toolbar.html" . }}

  <main id="main-content" tabindex="-1">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <button type="button" class="back-to-top" id="back-to-top" aria-label="กลับขึ้นด้านบน" hidden>
    <span aria-hidden="true">↑</span>
  </button>

  {{ $js := resources.Get "js/main.js" | minify | fingerprint }}
  <script src="{{ $js.RelPermalink }}" defer></script>
</body>
</html>
